# openclaw-skill-deps hint database
# Community contributions welcome — just add entries and open a PR!

bins:
  # ── JavaScript / Node ──────────────────────────────────────────────
  node:
    linux: "Install Node.js (>=18) and npm"
    macos: "brew install node"
    windows: "choco install nodejs-lts"
  npm:
    _alias: node
  npx:
    _alias: node

  # ── Python ─────────────────────────────────────────────────────────
  python:
    linux: "Install Python 3.10+"
    macos: "brew install python"
    windows: "choco install python"
  python3:
    _alias: python
  pip:
    _alias: python
  pip3:
    _alias: python
  uv:
    _all: "Install uv: https://astral.sh/uv"

  # ── Version control ────────────────────────────────────────────────
  git:
    linux: "sudo apt-get install -y git"
    macos: "brew install git"
    windows: "choco install git"

  # ── Media / document ───────────────────────────────────────────────
  ffmpeg:
    linux: "sudo apt-get install -y ffmpeg"
    macos: "brew install ffmpeg"
    windows: "choco install ffmpeg"
  pandoc:
    linux: "sudo apt-get install -y pandoc"
    macos: "brew install pandoc"
    windows: "choco install pandoc"
  convert:
    linux: "sudo apt-get install -y imagemagick"
    macos: "brew install imagemagick"
    windows: "choco install imagemagick"
  magick:
    _alias: convert

  # ── Containers ─────────────────────────────────────────────────────
  docker:
    linux: "sudo apt-get install -y docker.io"
    macos: "Install Docker Desktop for Mac"
    windows: "Install Docker Desktop for Windows"

  # ── Fonts / fontconfig ─────────────────────────────────────────────
  fc-list:
    linux: "sudo apt-get install -y fontconfig"
    _all: "Install fontconfig"

  # ── LaTeX ──────────────────────────────────────────────────────────
  pdflatex:
    linux: "sudo apt-get install -y texlive-latex-base"
    macos: "brew install --cask mactex"
    windows: "Install MiKTeX or TeX Live"
  bibtex:
    _alias: pdflatex

  # ── Build tools ────────────────────────────────────────────────────
  cmake:
    linux: "sudo apt-get install -y cmake"
    macos: "brew install cmake"
    windows: "choco install cmake"
  make:
    linux: "sudo apt-get install -y build-essential"
    macos: "xcode-select --install"
    windows: "choco install make"
  gcc:
    _alias: make
  g++:
    _alias: make

  # ── Rust ───────────────────────────────────────────────────────────
  cargo:
    linux: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh"
    macos: "brew install rust"
    windows: "choco install rust"
  rustc:
    _alias: cargo

  # ── Go ─────────────────────────────────────────────────────────────
  go:
    linux: "sudo apt-get install -y golang"
    macos: "brew install go"
    windows: "choco install golang"

  # ── Java ───────────────────────────────────────────────────────────
  java:
    linux: "sudo apt-get install -y default-jdk"
    macos: "brew install openjdk"
    windows: "choco install openjdk"
  javac:
    _alias: java

  # ── Network utilities ──────────────────────────────────────────────
  curl:
    linux: "sudo apt-get install -y curl"
    macos: "(built-in on macOS)"
    windows: "(built-in on Windows 10+)"
  wget:
    linux: "sudo apt-get install -y wget"
    macos: "brew install wget"
    windows: "choco install wget"

# ── Version detection commands ─────────────────────────────────────────
version_commands:
  node:
    cmd: "node --version"
    pattern: "v?(\\d+\\.\\d+\\.\\d+)"
  npm:
    cmd: "npm --version"
    pattern: "(\\d+\\.\\d+\\.\\d+)"
  python3:
    cmd: "python3 --version"
    pattern: "Python (\\d+\\.\\d+\\.\\d+)"
  python:
    cmd: "python --version"
    pattern: "Python (\\d+\\.\\d+\\.\\d+)"
  pip:
    cmd: "pip --version"
    pattern: "pip (\\d+\\.\\d+\\.?\\d*)"
  ffmpeg:
    cmd: "ffmpeg -version"
    pattern: "ffmpeg version (\\d+\\.\\d+\\.?\\d*)"
  docker:
    cmd: "docker --version"
    pattern: "Docker version (\\d+\\.\\d+\\.\\d+)"
  git:
    cmd: "git --version"
    pattern: "git version (\\d+\\.\\d+\\.\\d+)"
  cmake:
    cmd: "cmake --version"
    pattern: "cmake version (\\d+\\.\\d+\\.\\d+)"
  go:
    cmd: "go version"
    pattern: "go(\\d+\\.\\d+\\.?\\d*)"
  cargo:
    cmd: "cargo --version"
    pattern: "cargo (\\d+\\.\\d+\\.\\d+)"
  rustc:
    cmd: "rustc --version"
    pattern: "rustc (\\d+\\.\\d+\\.\\d+)"
  java:
    cmd: "java -version"
    pattern: "\"(\\d+\\.\\d+\\.\\d+)"

# ── Transitive (indirect) dependencies ─────────────────────────────────
transitive_deps:
  playwright:
    libs_linux: [libnspr4.so, libnss3.so, libatk-1.0.so.0, libatk-bridge-2.0.so.0, libcups.so.2, libdrm.so.2, libxkbcommon.so.0, libxcomposite.so.1, libxdamage.so.1, libxrandr.so.2, libgbm.so.1, libpango-1.0.so.0, libasound.so.2]
    note: "Playwright bundles Chromium which needs these shared libs on Linux"
  playwright-chromium:
    _alias: playwright
  puppeteer:
    libs_linux: [libnspr4.so, libnss3.so, libatk-1.0.so.0, libcups.so.2, libxkbcommon.so.0, libasound.so.2]
    note: "Puppeteer drives Chromium and requires similar libraries"
  opencv-python:
    libs_linux: [libGL.so.1]
    note: "OpenCV needs OpenGL support on Linux"
  opencv-contrib-python:
    _alias: opencv-python

# ── Shared libraries (Linux) ───────────────────────────────────────────
libs:
  libnspr4.so:
    apt: "sudo apt-get install -y libnspr4"
  libnss3.so:
    apt: "sudo apt-get install -y libnss3"
  libatk-1.0.so.0:
    apt: "sudo apt-get install -y libatk1.0-0"
  libatk-bridge-2.0.so.0:
    apt: "sudo apt-get install -y libatk-bridge2.0-0"
  libcups.so.2:
    apt: "sudo apt-get install -y libcups2"
  libdrm.so.2:
    apt: "sudo apt-get install -y libdrm2"
  libxkbcommon.so.0:
    apt: "sudo apt-get install -y libxkbcommon0"
  libxcomposite.so.1:
    apt: "sudo apt-get install -y libxcomposite1"
  libxdamage.so.1:
    apt: "sudo apt-get install -y libxdamage1"
  libxrandr.so.2:
    apt: "sudo apt-get install -y libxrandr2"
  libgbm.so.1:
    apt: "sudo apt-get install -y libgbm1"
  libpango-1.0.so.0:
    apt: "sudo apt-get install -y libpango-1.0-0"
  libasound.so.2:
    apt: "sudo apt-get install -y libasound2"

# ── Fonts ──────────────────────────────────────────────────────────────
fonts:
  "Noto Sans CJK":
    linux: "sudo apt-get install -y fonts-noto-cjk"
    macos: "brew install --cask font-noto-sans-cjk-sc"
    windows: "Install Noto Sans CJK (ttf/otf); then rerun fc-cache"
    fc_match:
      - "NotoSansCJK"
      - "Noto Sans CJK"
  "WenQuanYi":
    linux: "sudo apt-get install -y fonts-wqy-zenhei fonts-wqy-microhei"
    fc_match:
      - "WenQuanYi"

# ── Known npm/pip packages that imply system dependencies ──────────────
package_deps:
  npm:
    playwright:
      note: "Run: npx playwright install --with-deps"
    playwright-chromium:
      note: "Run: npx playwright install --with-deps"
    sharp:
      note: "May need libvips-dev on Linux"
      apt: "sudo apt-get install -y libvips-dev"
    canvas:
      note: "Needs native build deps on Linux"
      apt: "sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential g++"
    puppeteer:
      note: "Run: npx puppeteer browsers install chrome"
    node-sass:
      note: "Needs native build tools"
      apt: "sudo apt-get install -y build-essential"
  pip:
    playwright:
      note: "Run: python -m playwright install"
    opencv-python:
      apt: "sudo apt-get install -y libgl1-mesa-glx"
    opencv-contrib-python:
      apt: "sudo apt-get install -y libgl1-mesa-glx"
    Pillow:
      apt: "sudo apt-get install -y libjpeg-dev zlib1g-dev"
    pycairo:
      apt: "sudo apt-get install -y libcairo2-dev"
    psycopg2:
      apt: "sudo apt-get install -y libpq-dev"
    mysqlclient:
      apt: "sudo apt-get install -y default-libmysqlclient-dev build-essential"

# ── Dependency profiles for common stacks ──────────────────────────────
profiles:
  slidev:
    description: "Slidev presentation framework"
    bins: [node, npm]
    fonts: ["Noto Sans CJK"]
  marp:
    description: "Marp slide deck framework"
    bins: [node, npm]
  whisper:
    description: "OpenAI Whisper speech recognition"
    bins: [python3, ffmpeg]
  pdf-export:
    description: "PDF export with CJK support"
    bins: [node, npm]
    fonts: ["Noto Sans CJK"]
    libs: [libnspr4.so, libnss3.so]
  latex:
    description: "LaTeX document compilation"
    bins: [pdflatex, bibtex]
  web-scraping:
    description: "Web scraping with Playwright/Chromium"
    bins: [node, npm]
    libs: [libnspr4.so, libnss3.so]
  media-processing:
    description: "Audio/video processing"
    bins: [ffmpeg]
  docker-build:
    description: "Docker container builds"
    bins: [docker]
