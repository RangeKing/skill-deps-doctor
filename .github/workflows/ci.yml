name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (mypy)
        run: mypy openclaw_skill_deps/

      - name: Test
        run: pytest -v --tb=short

      - name: Smoke (help)
        run: skill-deps-doctor --help

      - name: Smoke (json output)
        run: skill-deps-doctor --skills-dir . --json || true

  schema-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate hints schema
        run: skill-deps-doctor --skills-dir . --validate-hints

      - name: Validate plugin contracts
        run: skill-deps-doctor --skills-dir . --validate-plugins

      - name: Verify hints migration is clean
        run: python scripts/migrate_hints_schema.py --in openclaw_skill_deps/data/hints.yaml --check
