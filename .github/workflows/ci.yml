name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (mypy)
        run: mypy openclaw_skill_deps/

      - name: Test
        run: pytest -v --tb=short

      - name: Smoke (help)
        run: openclaw-skill-deps --help

      - name: Smoke (json output)
        run: openclaw-skill-deps --skills-dir . --json || true
