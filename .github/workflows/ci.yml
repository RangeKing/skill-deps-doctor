name: ci

on:
  push:
  pull_request:

jobs:
  lint-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Smoke (help)
        run: |
          openclaw-skill-deps --help

      - name: Smoke (json output)
        run: |
          openclaw-skill-deps --skills-dir . --json || true
